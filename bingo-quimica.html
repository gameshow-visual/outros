<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background-color: black;
            margin: 0px;
            user-select: none;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        [quadrado] {
            top: 15px;
            color: white;
            border-radius: 10px;
            position: absolute;
            width: 330px;
            height: 250px;

            /* aspect-ratio: 1/1; */
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            box-sizing: border-box;
        }

        #nummassa {
            font-size: 40pt;
            position: absolute;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            top: 5px;
        }

        #simbolo {
            font-size: 80pt;
            position: absolute;
            font-weight: bold;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #nome {
            font-size: 22pt;
            position: absolute;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            bottom: 5px;
        }

        [gerar],
        [reiniciar] {
            border: 3px solid white;
            box-sizing: border-box;
            border-radius: 10px;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16pt;
            width: 100px;
            height: 100px;
            font-weight: bold;
        }

        [gerar] {
            cursor: pointer;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: green;
            right: 15px;
            top: 280px;
        }

        [reiniciar] {
            cursor: pointer;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: red;
            left: 15px;
            top: 280px;
        }

        [historico] {
            overflow-y: auto;
            /* scroll vertical */
            box-sizing: border-box;
            font-size: 30pt;
            padding: 5px;
            position: absolute;
            bottom: 0px;
            display: flex;
            align-items: center;
            justify-content: center;

            width: 100%;
            height: 340px;

            border: 1px solid white;
            color: white;

            text-align: center;
            flex-wrap: wrap;
            /* permite quebrar linha */
            word-break: break-word;
            /* quebra texto longo */
        }

        #idquant {
            position: absolute;
            font-size: 14pt;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            top: 320px;
            font-weight: bold;
            display: flex;
            text-align: center;        
        }
    </style>
</head>

<body>
    <div historico id="idhist"></div>

    <div gerar onclick="bingo('sortear')">SORTEAR</div>
    <div reiniciar onclick="bingo('reiniciar')">REIN.</div>
    <div quadrado>
        <div id="nummassa"></div>
        <div id="simbolo"></div>
        <div id="nome"></div>
    </div>
    <div id="idquant"></div>
</body>

</html>

    function bingo(comando) {
        if (comando == 'sortear') {

            } else {

                hist.push(vbingo[0].codigo)
                document.getElementById('idhist').innerHTML = hist.join(", ")

                vbingo.shift();
                ++nelem;
                document.getElementById('idquant').innerHTML = nelem + "/" + elementos.length;
